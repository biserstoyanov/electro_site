<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Модерна Галерия</title>

  <!-- GLightbox CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />

  <!-- AOS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      transition: transform 0.4s ease;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1 data-aos="fade-down">Моята Модерна Галерия</h1>

  <div class="gallery">

    <a href="https://picsum.photos/id/1015/1200/800"
       class="glightbox"
       data-gallery="gallery1"
       data-aos="zoom-in">
      <img src="https://picsum.photos/id/1015/400/300" alt="">
    </a>

    <a href="https://picsum.photos/id/1016/1200/800"
       class="glightbox"
       data-gallery="gallery1"
       data-aos="zoom-in">
      <img src="https://picsum.photos/id/1016/400/300" alt="">
    </a>

    <a href="https://picsum.photos/id/1025/1200/800"
       class="glightbox"
       data-gallery="gallery1"
       data-aos="zoom-in">
      <img src="https://picsum.photos/id/1025/400/300" alt="">
    </a>

  </div>

  <!-- GLightbox JS -->
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <script>
    // Стартиране на GLightbox
    const lightbox = GLightbox({
      selector: '.glightbox'
    });

    // Стартиране на AOS
    AOS.init({
      duration: 1000,
      once: true
    });
  </script>

</body>
</html>
